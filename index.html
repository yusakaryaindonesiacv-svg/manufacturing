<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MANUFACTURING" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/factory.png" />
    <title>Manajemen Produksi & HPP</title>
    <script>
      (function() {
        if (typeof window !== 'undefined') {
          // Provide 'global' only if missing
          if (!window.global) {
            window.global = window;
          }
          
          // Fix for "Cannot set property fetch which has only a getter"
          // We apply a setter that ignores assignments to prevent TypeErrors in libraries
          try {
            var currentFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return currentFetch; },
              set: function(v) { 
                console.warn('Attempt to overwrite native fetch blocked to prevent TypeError');
              },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.error('Failed to apply fetch safe-guard:', e);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
